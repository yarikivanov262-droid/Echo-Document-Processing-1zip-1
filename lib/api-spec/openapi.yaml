openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ECHO Anonymous Messenger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User operations
  - name: messages
    description: Message operations
  - name: chats
    description: Chat and group operations
  - name: files
    description: File operations
  - name: prekeys
    description: Cryptographic pre-key operations
  - name: contacts
    description: Contact and block-list operations
  - name: stickers
    description: Sticker pack operations
  - name: folders
    description: Chat folder operations
  - name: stars
    description: ECHO Stars virtual currency
  - name: premium
    description: ECHO Premium subscription
  - name: push
    description: Web Push notification operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new anonymous user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "409":
          description: Username taken

  /check-username:
    post:
      operationId: checkUsername
      tags: [auth]
      summary: Check username availability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsernameCheck"
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsernameAvailability"

  /login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with seed hash and device key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /restore:
    post:
      operationId: restoreAccount
      tags: [auth]
      summary: Restore account via seed hash
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreInput"
      responses:
        "200":
          description: Account restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid seed

  /delete-account:
    post:
      operationId: deleteAccount
      tags: [auth]
      summary: Burn account - delete all data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountInput"
      responses:
        "200":
          description: Account burned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users except self
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicUser"

  /numbers/check/{number}:
    get:
      operationId: checkEchoNumber
      tags: [users]
      summary: Check if an ECHO number is available
      parameters:
        - name: number
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EchoNumberAvailability"

  /numbers/claim:
    post:
      operationId: claimEchoNumber
      tags: [users]
      summary: Claim an ECHO number for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimEchoNumberInput"
      responses:
        "200":
          description: Number claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "409":
          description: Number already taken

  /users/by-number/{echoNumber}:
    get:
      operationId: getUserByEchoNumber
      tags: [users]
      summary: Find user by ECHO number (+999XXXXXXX)
      parameters:
        - name: echoNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "404":
          description: User not found

  /users/{username}:
    get:
      operationId: getUserByUsername
      tags: [users]
      summary: Search user by username and get public key
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "404":
          description: User not found

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile (displayName, bio, avatar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/settings:
    patch:
      operationId: updateSettings
      tags: [users]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /prekeys:
    post:
      operationId: uploadPrekeys
      tags: [prekeys]
      summary: Upload new one-time pre-keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrekeysInput"
      responses:
        "200":
          description: Pre-keys uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages for a chat
      parameters:
        - name: chatId
          in: query
          required: true
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send an encrypted message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/search:
    get:
      operationId: searchMessages
      tags: [messages]
      summary: Search messages by text content
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: chatId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Matching messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageSearchResult"

  /polls:
    post:
      operationId: createPoll
      tags: [messages]
      summary: Create a poll in a chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePollInput"
      responses:
        "201":
          description: Poll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResult"

  /polls/{id}:
    get:
      operationId: getPoll
      tags: [messages]
      summary: Get poll with vote counts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResult"

  /polls/{id}/vote:
    post:
      operationId: votePoll
      tags: [messages]
      summary: Vote on a poll (or retract vote)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VotePollInput"
      responses:
        "200":
          description: Updated poll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResult"

  /polls/{id}/close:
    post:
      operationId: closePoll
      tags: [messages]
      summary: Close a poll (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Closed poll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollResult"

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/{id}/read:
    post:
      operationId: markMessageRead
      tags: [messages]
      summary: Mark message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chats:
    get:
      operationId: getChats
      tags: [chats]
      summary: Get all chats for current user
      responses:
        "200":
          description: List of chats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatSummary"
    post:
      operationId: createChat
      tags: [chats]
      summary: Create a group or channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "201":
          description: Chat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{id}:
    get:
      operationId: getChat
      tags: [chats]
      summary: Get chat details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
    patch:
      operationId: updateChat
      tags: [chats]
      summary: Update chat settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatUpdate"
      responses:
        "200":
          description: Chat updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

  /chats/{id}/members:
    get:
      operationId: getChatMembers
      tags: [chats]
      summary: Get members of a group/channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMember"
    post:
      operationId: addChatMember
      tags: [chats]
      summary: Add member to chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberInput"
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chats/{id}/members/{userId}:
    delete:
      operationId: removeChatMember
      tags: [chats]
      summary: Remove member from chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chats/{id}/member-settings:
    patch:
      operationId: updateChatMemberSettings
      tags: [chats]
      summary: Update my per-chat settings (pin, archive, mute, draft)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMemberSettingsInput"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /chats/stats:
    get:
      operationId: getChatStats
      tags: [chats]
      summary: Get chat activity stats for current user
      responses:
        "200":
          description: Chat statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatStats"

  /files/upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload encrypted file (base64 encoded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileUploadInput"
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResult"

  /files/{fileId}:
    get:
      operationId: getFile
      tags: [files]
      summary: Download file metadata
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"

  /sessions:
    get:
      operationId: getSessions
      tags: [auth]
      summary: Get active sessions
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /sessions/{deviceId}:
    delete:
      operationId: terminateSession
      tags: [auth]
      summary: Terminate a session
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/{id}/edit:
    patch:
      operationId: editMessage
      tags: [messages]
      summary: Edit a sent message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditMessageBody"
      responses:
        "200":
          description: Message edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/{id}/react:
    post:
      operationId: reactToMessage
      tags: [messages]
      summary: Add or remove a reaction on a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactBody"
      responses:
        "200":
          description: Reaction toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages/{id}/pin:
    post:
      operationId: pinMessage
      tags: [messages]
      summary: Toggle pin state of a message within its chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pin toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinMessageResponse"

  /messages/{id}/forward:
    post:
      operationId: forwardMessage
      tags: [messages]
      summary: Forward a message to another chat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardMessageBody"
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /backup/upload:
    post:
      operationId: uploadBackup
      tags: [auth]
      summary: Upload encrypted backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupInput"
      responses:
        "200":
          description: Backup uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /backup/latest:
    get:
      operationId: getLatestBackup
      tags: [auth]
      summary: Get latest backup
      responses:
        "200":
          description: Latest backup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupInfo"

  /contacts:
    get:
      operationId: getContacts
      tags: [contacts]
      summary: List user's contacts
      responses:
        "200":
          description: Contacts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: addContact
      tags: [contacts]
      summary: Add a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddContactInput"
      responses:
        "201":
          description: Contact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "409":
          description: Already added

  /contacts/{contactId}:
    delete:
      operationId: removeContact
      tags: [contacts]
      summary: Remove a contact
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /contacts/{contactId}/block:
    post:
      operationId: blockUser
      tags: [contacts]
      summary: Block a user
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      operationId: unblockUser
      tags: [contacts]
      summary: Unblock a user
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /blocked-users:
    get:
      operationId: getBlockedUsers
      tags: [contacts]
      summary: List blocked users
      responses:
        "200":
          description: Blocked users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedUser"

  /activity-log:
    get:
      operationId: getActivityLog
      tags: [users]
      summary: Get security activity log
      responses:
        "200":
          description: Activity log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogEntry"

  /stickers/packs:
    get:
      operationId: getStickerPacks
      tags: [stickers]
      summary: List all sticker packs
      responses:
        "200":
          description: Sticker packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StickerPack"

  /stickers/installed:
    get:
      operationId: getInstalledStickerPacks
      tags: [stickers]
      summary: List installed sticker packs
      responses:
        "200":
          description: Installed sticker packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StickerPack"

  /stickers/install:
    post:
      operationId: installStickerPack
      tags: [stickers]
      summary: Install a sticker pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallStickerPackInput"
      responses:
        "200":
          description: Installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stickers/install/{packId}:
    delete:
      operationId: uninstallStickerPack
      tags: [stickers]
      summary: Uninstall a sticker pack
      parameters:
        - name: packId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Uninstalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /folders:
    get:
      operationId: getFolders
      tags: [folders]
      summary: List my chat folders
      responses:
        "200":
          description: Folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatFolder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a chat folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatFolderInput"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatFolder"

  /folders/{id}:
    patch:
      operationId: patchFolder
      tags: [folders]
      summary: Update a chat folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatFolderUpdate"
      responses:
        "200":
          description: Folder updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatFolder"
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete a chat folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Folder deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /calls:
    get:
      operationId: getCalls
      tags: [calls]
      summary: List call history for the current user
      responses:
        "200":
          description: Call history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallLog"
    post:
      operationId: createCall
      tags: [calls]
      summary: Start a new call (creates a call log entry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallInput"
      responses:
        "201":
          description: Call created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"

  /calls/{id}:
    patch:
      operationId: updateCall
      tags: [calls]
      summary: Update call status (answered/ended/etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCallInput"
      responses:
        "200":
          description: Call updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallLog"

  /stars:
    get:
      operationId: getStars
      tags: [stars]
      summary: Get my stars balance and transaction history
      responses:
        "200":
          description: Stars balance and transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarsBalanceResponse"

  /stars/purchase:
    post:
      operationId: purchaseStars
      tags: [stars]
      summary: Purchase a stars package (demo — free)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseStarsInput"
      responses:
        "200":
          description: Stars purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseStarsResponse"

  /stars/gift:
    post:
      operationId: giftStars
      tags: [stars]
      summary: Gift stars to another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftStarsInput"
      responses:
        "200":
          description: Stars gifted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stars/tip:
    post:
      operationId: tipStars
      tags: [stars]
      summary: Send tip stars on a channel message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TipStarsInput"
      responses:
        "200":
          description: Tip sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stars/react:
    post:
      operationId: paidReaction
      tags: [stars]
      summary: Send a paid reaction on a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TipStarsInput"
      responses:
        "200":
          description: Reaction sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /premium:
    get:
      operationId: getPremiumStatus
      tags: [premium]
      summary: Get current premium status
      responses:
        "200":
          description: Premium status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PremiumStatusResponse"

  /premium/subscribe:
    post:
      operationId: subscribePremium
      tags: [premium]
      summary: Subscribe to ECHO Premium using stars
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribePremiumInput"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribePremiumResponse"
    delete:
      operationId: cancelPremium
      tags: [premium]
      summary: Cancel premium auto-renewal
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      summary: Get the server's VAPID public key for Web Push subscription
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidPublicKeyResponse"

  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register a Web Push subscription for the current device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeInput"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /push/unsubscribe:
    post:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove a Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  type: string
              required: [endpoint]
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    VapidPublicKeyResponse:
      type: object
      properties:
        publicKey:
          type: string
      required: [publicKey]

    PushSubscribeInput:
      type: object
      properties:
        endpoint:
          type: string
        keys:
          type: object
          properties:
            p256dh:
              type: string
            auth:
              type: string
          required: [p256dh, auth]
      required: [endpoint, keys]

    RegisterInput:
      type: object
      properties:
        username:
          type: string
        publicIdentityKey:
          type: string
        publicSignedPrekey:
          type: string
        publicOneTimePrekeys:
          type: array
          items:
            type: string
        seedHash:
          type: string
      required: [username, publicIdentityKey, seedHash]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        seedHash:
          type: string
        publicDeviceKey:
          type: string
        signature:
          type: string
      required: [username, seedHash]

    RestoreInput:
      type: object
      properties:
        seedHash:
          type: string
        publicDeviceKey:
          type: string
        newPublicIdentityKey:
          type: string
      required: [seedHash]

    DeleteAccountInput:
      type: object
      properties:
        seedHash:
          type: string
        signature:
          type: string
      required: [seedHash]

    AuthResult:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        sessionToken:
          type: string
        deviceId:
          type: string
      required: [userId, username, sessionToken, deviceId]

    UsernameCheck:
      type: object
      properties:
        username:
          type: string
      required: [username]

    UsernameAvailability:
      type: object
      properties:
        available:
          type: boolean
      required: [available]

    EchoNumberAvailability:
      type: object
      properties:
        available:
          type: boolean
        number:
          type: string
      required: [available, number]

    ClaimEchoNumberInput:
      type: object
      properties:
        number:
          type: string
      required: [number]

    PublicUser:
      type: object
