          type: integer
        username:
          type: string
        publicIdentityKey:
          type: string
        publicSignedPrekey:
          type: string
        oneTimePrekey:
          type: ["string", "null"]
        lastActive:
          type: ["string", "null"]
        avatarFileId:
          type: ["string", "null"]
        displayName:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        isPremium:
          type: boolean
        echoNumber:
          type: ["string", "null"]
      required: [id, username, publicIdentityKey]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        publicIdentityKey:
          type: string
        lastActive:
          type: string
        avatarFileId:
          type: ["string", "null"]
        displayName:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        isPremium:
          type: boolean
        starsBalance:
          type: integer
        settings:
          $ref: "#/components/schemas/UserSettings"
        createdAt:
          type: string
        echoNumber:
          type: ["string", "null"]
      required: [id, username, publicIdentityKey, lastActive, createdAt, isPremium, starsBalance]

    UpdateMeInput:
      type: object
      properties:
        displayName:
          type: ["string", "null"]
          maxLength: 64
        bio:
          type: ["string", "null"]
          maxLength: 255
        avatarFileId:
          type: ["string", "null"]

    UserSettings:
      type: object
      properties:
