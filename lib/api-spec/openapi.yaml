        senderId:
          type: integer
        senderUsername:
          type: string
        chatId:
          type: integer
        chatType:
          type: integer
        encryptedContent:
          type: string
        timestamp:
          type: string
        deliveredAt:
          type: ["string", "null"]
        readAt:
          type: ["string", "null"]
        deleteAfterRead:
          type: boolean
        deleteAfterSeconds:
